name: Daily Games Email

on:
  repository_dispatch:
    types: [daily_email]
  workflow_dispatch:
    inputs:
      email_to:
        description: "Only send to this email (overrides EMAIL_TO secret). Leave blank to use secret."
        required: false
        type: string

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python fetch_schedules.py
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ inputs.email_to != '' && inputs.email_to || secrets.EMAIL_TO }}
