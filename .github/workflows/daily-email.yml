name: Daily Games Email

on:
  schedule:
    # 12:00 PM America/Toronto. EDT=UTC-4 (16:00 UTC), EST=UTC-5 (17:00 UTC).
    # Offset from :00 to dodge GitHub Actions peak-load delays. ENFORCE_NOON
    # on the script side still allows an hour slop so a delayed run sends.
    - cron: "7 16 * * *"
    - cron: "7 17 * * *"
  workflow_dispatch:
    inputs:
      email_to:
        description: "Only send to this email (overrides EMAIL_TO secret). Leave blank to use secret."
        required: false
        type: string

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python fetch_schedules.py
        env:
          ENFORCE_NOON: ${{ github.event_name == 'schedule' && '1' || '0' }}
          CRON_SCHEDULE: ${{ github.event.schedule }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ inputs.email_to != '' && inputs.email_to || secrets.EMAIL_TO }}
